site_name: jquantstats
site_description: Quantitative financial analysis tools for Python
site_url: https://jebel-quant.github.io/jquantstats/
repo_url: https://github.com/jebel-quant/jquantstats
repo_name: jebel-quant/jquantstats

docs_dir: docs
site_dir: _mkdocs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

extra:
  version:
    provider: mike

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
  - admonition
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: index.md
  - API Reference: api_reference.md
  - Marimo Notebooks: notebooks.md
  - Reports: reports.md
  - Cost Models: cost_models.md
  - Docs:
    - Migration Guide: MIGRATION.md
    - API Stability: STABILITY.md
  - Rhiza:
    - Quick Reference: rhiza/QUICK_REFERENCE.md
    - Architecture: rhiza/ARCHITECTURE.md
    - Customization: rhiza/CUSTOMIZATION.md
    - Glossary: rhiza/GLOSSARY.md
    - Testing: rhiza/TESTS.md
    - Security: rhiza/SECURITY.md
    - Demo: rhiza/DEMO.md
